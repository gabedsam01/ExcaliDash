services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    command: ["start-dev", "--import-realm"]
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin123!
    ports:
      - "18080:8080"
    volumes:
      - ./local/oidc/realm-excalidash-local.json:/opt/keycloak/data/import/realm-excalidash.json:ro
    networks:
      - oidc-shared-net
    restart: unless-stopped

  postgres-basic:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: excalidash
      POSTGRES_USER: excalidash
      POSTGRES_PASSWORD: excalidash_local_pw
    volumes:
      - postgres-basic-data:/var/lib/postgresql/data
    networks:
      - basic-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U excalidash -d excalidash"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend-basic:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres-basic:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://excalidash:excalidash_local_pw@postgres-basic:5432/excalidash?schema=public
      - PORT=8000
      - NODE_ENV=production
      - AUTH_MODE=local
      - FRONTEND_URL=http://localhost:1001
      - TRUST_PROXY=false
      - JWT_SECRET=local-basic-jwt-secret-32-chars-min-0001
      - CSRF_SECRET=local-basic-csrf-secret-32-chars-0001
    volumes:
      - backend-basic-data:/app/prisma
    networks:
      - basic-net
    restart: unless-stopped

  frontend-basic:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "1001:80"
    environment:
      - BACKEND_URL=backend-basic:8000
    depends_on:
      - backend-basic
    networks:
      - basic-net
    restart: unless-stopped

  postgres-oidc:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: excalidash
      POSTGRES_USER: excalidash
      POSTGRES_PASSWORD: excalidash_local_pw
    volumes:
      - postgres-oidc-data:/var/lib/postgresql/data
    networks:
      - oidc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U excalidash -d excalidash"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend-oidc:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://excalidash:excalidash_local_pw@postgres-oidc:5432/excalidash?schema=public
      - PORT=8000
      - NODE_ENV=development
      - AUTH_MODE=oidc_enforced
      - FRONTEND_URL=http://localhost:1002
      - TRUST_PROXY=false
      - JWT_SECRET=local-oidc-jwt-secret-32-chars-min-0002
      - CSRF_SECRET=local-oidc-csrf-secret-32-chars-0002
      - OIDC_PROVIDER_NAME=Keycloak
      - OIDC_ISSUER_URL=http://host.docker.internal:18080/realms/excalidash
      - OIDC_CLIENT_ID=excalidash
      - OIDC_CLIENT_SECRET=excalidash-secret
      - OIDC_REDIRECT_URI=http://localhost:1002/api/auth/oidc/callback
      - OIDC_REQUIRE_EMAIL_VERIFIED=false
    volumes:
      - backend-oidc-data:/app/prisma
    depends_on:
      keycloak:
        condition: service_started
      postgres-oidc:
        condition: service_healthy
    networks:
      - oidc-net
      - oidc-shared-net
    restart: unless-stopped

  frontend-oidc:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "1002:80"
    environment:
      - BACKEND_URL=backend-oidc:8000
    depends_on:
      - backend-oidc
    networks:
      - oidc-net
    restart: unless-stopped

  postgres-hybrid:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: excalidash
      POSTGRES_USER: excalidash
      POSTGRES_PASSWORD: excalidash_local_pw
    volumes:
      - postgres-hybrid-data:/var/lib/postgresql/data
    networks:
      - hybrid-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U excalidash -d excalidash"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend-hybrid:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://excalidash:excalidash_local_pw@postgres-hybrid:5432/excalidash?schema=public
      - PORT=8000
      - NODE_ENV=development
      - AUTH_MODE=hybrid
      - FRONTEND_URL=http://localhost:1003
      - TRUST_PROXY=false
      - JWT_SECRET=local-hybrid-jwt-secret-32-chars-min-0003
      - CSRF_SECRET=local-hybrid-csrf-secret-32-chars-0003
      - OIDC_PROVIDER_NAME=Keycloak
      - OIDC_ISSUER_URL=http://host.docker.internal:18080/realms/excalidash
      - OIDC_CLIENT_ID=excalidash
      - OIDC_CLIENT_SECRET=excalidash-secret
      - OIDC_REDIRECT_URI=http://localhost:1003/api/auth/oidc/callback
      - OIDC_REQUIRE_EMAIL_VERIFIED=false
    volumes:
      - backend-hybrid-data:/app/prisma
    depends_on:
      keycloak:
        condition: service_started
      postgres-hybrid:
        condition: service_healthy
    networks:
      - hybrid-net
      - oidc-shared-net
    restart: unless-stopped

  frontend-hybrid:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "1003:80"
    environment:
      - BACKEND_URL=backend-hybrid:8000
    depends_on:
      - backend-hybrid
    networks:
      - hybrid-net
    restart: unless-stopped

networks:
  basic-net:
    driver: bridge
  oidc-net:
    driver: bridge
  hybrid-net:
    driver: bridge
  oidc-shared-net:
    driver: bridge

volumes:
  backend-basic-data:
  backend-oidc-data:
  backend-hybrid-data:
  postgres-basic-data:
  postgres-oidc-data:
  postgres-hybrid-data:
