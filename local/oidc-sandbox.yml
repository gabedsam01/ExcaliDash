services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    command: ["start-dev"]
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin123!
    ports:
      - "18081:8080"
    networks:
      - oidc-shared
    restart: unless-stopped

  postgres-local:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: excalidash
      POSTGRES_USER: excalidash
      POSTGRES_PASSWORD: excalidash_local_pw
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
    networks:
      - local-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U excalidash -d excalidash"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend-local:
    build:
      context: ../backend
      dockerfile: Dockerfile
    depends_on:
      postgres-local:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://excalidash:excalidash_local_pw@postgres-local:5432/excalidash?schema=public
      - PORT=8000
      - NODE_ENV=production
      - AUTH_MODE=local
      - FRONTEND_URL=http://localhost:1000
      - TRUST_PROXY=false
      - JWT_SECRET=local-auth-jwt-secret-32-char-min-0001
      - CSRF_SECRET=local-auth-csrf-secret-32-char-min-0001
    volumes:
      - backend-local-data:/app/prisma
    networks:
      - local-net
    restart: unless-stopped

  frontend-local:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    ports:
      - "1000:80"
    environment:
      - BACKEND_URL=backend-local:8000
    depends_on:
      - backend-local
    networks:
      - local-net
    restart: unless-stopped

  postgres-oidc:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: excalidash
      POSTGRES_USER: excalidash
      POSTGRES_PASSWORD: excalidash_oidc_pw
    volumes:
      - postgres-oidc-data:/var/lib/postgresql/data
    networks:
      - oidc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U excalidash -d excalidash"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend-oidc:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://excalidash:excalidash_oidc_pw@postgres-oidc:5432/excalidash?schema=public
      - PORT=8000
      - NODE_ENV=development
      - AUTH_MODE=oidc_enforced
      - FRONTEND_URL=http://localhost:1001
      - TRUST_PROXY=false
      - JWT_SECRET=oidc-auth-jwt-secret-32-char-min-0002
      - CSRF_SECRET=oidc-auth-csrf-secret-32-char-min-0002
      - OIDC_PROVIDER_NAME=Keycloak
      - OIDC_ISSUER_URL=http://host.docker.internal:18081/realms/excalidash
      - OIDC_CLIENT_ID=excalidash
      - OIDC_CLIENT_SECRET=excalidash-secret
      - OIDC_REDIRECT_URI=http://localhost:1001/api/auth/oidc/callback
      - OIDC_ID_TOKEN_SIGNED_RESPONSE_ALG=HS256
      - OIDC_REQUIRE_EMAIL_VERIFIED=false
    volumes:
      - backend-oidc-data:/app/prisma
    depends_on:
      keycloak:
        condition: service_started
      postgres-oidc:
        condition: service_healthy
    networks:
      - oidc-net
      - oidc-shared
    restart: unless-stopped

  frontend-oidc:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    ports:
      - "1001:80"
    environment:
      - BACKEND_URL=backend-oidc:8000
    depends_on:
      - backend-oidc
    networks:
      - oidc-net
    restart: unless-stopped

networks:
  local-net:
    driver: bridge
  oidc-net:
    driver: bridge
  oidc-shared:
    driver: bridge

volumes:
  backend-local-data:
  backend-oidc-data:
  postgres-local-data:
  postgres-oidc-data:
