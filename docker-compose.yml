name: excalidash-v2

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-excalidash}
      POSTGRES_USER: ${POSTGRES_USER:-excalidash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set. Run quickstart.sh or create .env from .env.example.}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - excalidash
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-excalidash} -d ${POSTGRES_DB:-excalidash}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    image: ghcr.io/gabedsam01/excalidash-v2:${EXCALIDASH_BACKEND_TAG:-backend-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8000
      AUTH_MODE: ${AUTH_MODE:-local}
      APP_URL: ${APP_URL:-http://localhost:6767}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:6767}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      ENFORCE_HTTPS_REDIRECT: ${ENFORCE_HTTPS_REDIRECT:-false}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set. Run quickstart.sh or create .env from .env.example.}
      DATABASE_URL: postgresql://${POSTGRES_USER:-excalidash}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-excalidash}?schema=public&sslmode=disable
      DIRECT_URL: postgresql://${POSTGRES_USER:-excalidash}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-excalidash}?schema=public&sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set. Run quickstart.sh or create .env from .env.example.}
      CSRF_SECRET: ${CSRF_SECRET:?CSRF_SECRET must be set. Run quickstart.sh or create .env from .env.example.}
      API_KEY_SECRET: ${API_KEY_SECRET:?API_KEY_SECRET must be set. Run quickstart.sh or create .env from .env.example.}
      MCP_ENABLED: ${MCP_ENABLED:-true}
      MCP_MIN_DRAWING_SCORE: ${MCP_MIN_DRAWING_SCORE:-95}
      MCP_MAX_REPAIR_ATTEMPTS: ${MCP_MAX_REPAIR_ATTEMPTS:-5}
      MCP_ALLOW_LOW_SCORE_DRAFT: ${MCP_ALLOW_LOW_SCORE_DRAFT:-true}
      MCP_LIBRARY_MODE: ${MCP_LIBRARY_MODE:-curated}
      MCP_DEFAULT_LIBRARY_MODE: ${MCP_DEFAULT_LIBRARY_MODE:-curated}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-250}
      MAX_JSON_BODY_MB: ${MAX_JSON_BODY_MB:-100}
      MAX_URLENCODED_BODY_MB: ${MAX_URLENCODED_BODY_MB:-100}
      MAX_SOCKET_PAYLOAD_MB: ${MAX_SOCKET_PAYLOAD_MB:-100}
      LIBRARY_CACHE_DIR: /app/data/libraries
      RUNTIME_DATA_DIR: /app/data
      LIBRARY_PUBLIC_SEARCH_ENABLED: ${LIBRARY_PUBLIC_SEARCH_ENABLED:-true}
      LIBRARY_AUTO_REFRESH_ON_START: ${LIBRARY_AUTO_REFRESH_ON_START:-true}
    volumes:
      - backend_data:/app/data
    networks:
      - excalidash
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s

  frontend:
    image: ghcr.io/gabedsam01/excalidash-v2:${EXCALIDASH_FRONTEND_TAG:-frontend-latest}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-6767}:80"
    environment:
      BACKEND_URL: backend:8000
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-250M}
      NGINX_PROXY_CONNECT_TIMEOUT: ${NGINX_PROXY_CONNECT_TIMEOUT:-300s}
      NGINX_PROXY_SEND_TIMEOUT: ${NGINX_PROXY_SEND_TIMEOUT:-300s}
      NGINX_PROXY_READ_TIMEOUT: ${NGINX_PROXY_READ_TIMEOUT:-300s}
      NGINX_WEBSOCKET_READ_TIMEOUT: ${NGINX_WEBSOCKET_READ_TIMEOUT:-3600s}
      NGINX_WEBSOCKET_SEND_TIMEOUT: ${NGINX_WEBSOCKET_SEND_TIMEOUT:-3600s}
    networks:
      - excalidash
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  excalidash:
    driver: bridge

volumes:
  postgres_data:
  backend_data:
