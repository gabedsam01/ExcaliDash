services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-excalidash}
      POSTGRES_USER: ${POSTGRES_USER:-excalidash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - excalidash-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-excalidash} -d ${POSTGRES_DB:-excalidash}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-excalidash}:${POSTGRES_PASSWORD:-change_me_strong_password}@postgres:5432/${POSTGRES_DB:-excalidash}?schema=public}
      PORT: ${PORT:-8000}
      NODE_ENV: ${NODE_ENV:-production}
      AUTH_MODE: ${AUTH_MODE:-local}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:6767}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      ENFORCE_HTTPS_REDIRECT: ${ENFORCE_HTTPS_REDIRECT:-false}
      JWT_SECRET: ${JWT_SECRET:-}
      CSRF_SECRET: ${CSRF_SECRET:-}
      API_KEY_SECRET: ${API_KEY_SECRET:-}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-250}
      MAX_JSON_BODY_MB: ${MAX_JSON_BODY_MB:-100}
      MAX_URLENCODED_BODY_MB: ${MAX_URLENCODED_BODY_MB:-100}
      MAX_SOCKET_PAYLOAD_MB: ${MAX_SOCKET_PAYLOAD_MB:-100}
      MAX_IMPORT_DRAWING_MB: ${MAX_IMPORT_DRAWING_MB:-100}
      MAX_IMPORT_MANIFEST_MB: ${MAX_IMPORT_MANIFEST_MB:-10}
      MAX_IMPORT_TOTAL_EXTRACTED_MB: ${MAX_IMPORT_TOTAL_EXTRACTED_MB:-500}
      MAX_DATA_URL_MB: ${MAX_DATA_URL_MB:-100}
      MAX_IMPORT_ARCHIVE_ENTRIES: ${MAX_IMPORT_ARCHIVE_ENTRIES:-10000}
      MAX_IMPORT_COLLECTIONS: ${MAX_IMPORT_COLLECTIONS:-2000}
      MAX_IMPORT_DRAWINGS: ${MAX_IMPORT_DRAWINGS:-10000}
      # Curated Excalidraw library packs (foundation for the future MCP server).
      LIBRARY_CACHE_DIR: ${LIBRARY_CACHE_DIR:-/app/data/libraries}
      LIBRARY_PUBLIC_SEARCH_ENABLED: ${LIBRARY_PUBLIC_SEARCH_ENABLED:-true}
      LIBRARY_AUTO_REFRESH_ON_START: ${LIBRARY_AUTO_REFRESH_ON_START:-true}
      LIBRARY_REFRESH_INTERVAL_HOURS: ${LIBRARY_REFRESH_INTERVAL_HOURS:-24}
      LIBRARY_DOWNLOAD_TIMEOUT_MS: ${LIBRARY_DOWNLOAD_TIMEOUT_MS:-15000}
      LIBRARY_DOWNLOAD_MAX_MB: ${LIBRARY_DOWNLOAD_MAX_MB:-25}
      LIBRARY_PUBLIC_SEARCH_MAX_RESULTS: ${LIBRARY_PUBLIC_SEARCH_MAX_RESULTS:-25}
      EXCALIDRAW_LIBRARIES_CATALOG_URL: ${EXCALIDRAW_LIBRARIES_CATALOG_URL:-https://raw.githubusercontent.com/excalidraw/excalidraw-libraries/main/libraries.json}
      EXCALIDRAW_LIBRARIES_BASE_URL: ${EXCALIDRAW_LIBRARIES_BASE_URL:-https://raw.githubusercontent.com/excalidraw/excalidraw-libraries/main/libraries}
    volumes:
      - backend-data:/app/prisma
      - library-data:/app/data
    networks:
      - excalidash-network
    restart: unless-stopped
    healthcheck:
      # Use IPv4 loopback explicitly to avoid IPv6 localhost resolution issues.
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-6767}:80"
    environment:
      BACKEND_URL: ${BACKEND_URL:-backend:8000}
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-250M}
      NGINX_PROXY_CONNECT_TIMEOUT: ${NGINX_PROXY_CONNECT_TIMEOUT:-300s}
      NGINX_PROXY_SEND_TIMEOUT: ${NGINX_PROXY_SEND_TIMEOUT:-300s}
      NGINX_PROXY_READ_TIMEOUT: ${NGINX_PROXY_READ_TIMEOUT:-300s}
      NGINX_WEBSOCKET_READ_TIMEOUT: ${NGINX_WEBSOCKET_READ_TIMEOUT:-3600s}
      NGINX_WEBSOCKET_SEND_TIMEOUT: ${NGINX_WEBSOCKET_SEND_TIMEOUT:-3600s}
    depends_on:
      - backend
    networks:
      - excalidash-network
    restart: unless-stopped
    healthcheck:
      # Use IPv4 loopback explicitly to avoid IPv6 localhost resolution issues.
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:80",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  excalidash-network:
    driver: bridge

volumes:
  backend-data:
  library-data:
  postgres_data:
